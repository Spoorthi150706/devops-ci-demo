name: DevOps CI Pipeline

on:
  push:
    branches:
      - main
      - feature/add-app

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-ci-demo:${{ github.sha }} .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/devops-ci-demo:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-ci-demo:${{ github.sha }}
